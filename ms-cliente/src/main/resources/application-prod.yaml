spring:
  datasource:
    url: ${CLIENTE_DB_URL}
    username: ${CLIENTE_DB_USERNAME}
    password: ${CLIENTE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.java.cliente_service: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always