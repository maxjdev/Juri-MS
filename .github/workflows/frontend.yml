name: Frontend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'infra/frontend.Dockerfile'
      - 'infra/nginx/frontend.conf'
      - '.github/workflows/frontend.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/frontend.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/juri-ms-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/juri-ms-frontend:${{ github.sha }}
          no-cache: true